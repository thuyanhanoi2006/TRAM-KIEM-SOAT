<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRẠM KIỂM SOÁT Z-CORE</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
      body { margin: 0; padding: 0; background: #000; font-family: 'Arial', sans-serif; text-align: center; color: white; }
      #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
      #btn-start { padding: 25px 50px; font-size: 24px; background: #008000; color: white; border: 3px solid #00FF00; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px #00FF00; text-transform: uppercase; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
      
      .main-ui { display: none; max-width: 600px; margin: 0 auto; padding: 10px; }
      .control-panel { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #444; }
      label { display: block; text-align: left; color: #ccc; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
      select, input[type="date"] { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background: #333; color: white; border: 1px solid #555; border-radius: 5px; outline: none; margin-bottom: 10px; box-sizing: border-box;}
      
     #scanner-container { position: relative; width: 100%; max-width: 500px; height: 350px; margin: 0 auto 15px auto; border: 3px solid #555; border-radius: 10px; overflow: hidden; background: #111; transition: border-color 0.2s;}
      #video { width: 100%; height: 100%; object-fit: cover; display: block; }
      
      #scan-region { 
        position: absolute; top: 7%; left: 7%; width: 86%; height: 86%; 
        border: 2px solid rgba(255, 255, 255, 0.4); border-radius: 15px; 
        box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); pointer-events: none; 
      }

      #status-popup { position: fixed; top: 15%; left: 50%; transform: translate(-50%, 0); width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; color: white; z-index: 1000; display: none; box-shadow: 0 10px 50px rgba(0,0,0,0.9); border: 2px solid #555; }
      .icon-large { font-size: 60px; display: block; margin-bottom: 10px; }
      #popup-msg { font-size: 22px; font-weight: bold; line-height: 1.3; text-transform: uppercase; }
      #debug-voice { font-size: 14px; color: #aaa; margin-top: 10px; font-style: italic; }
      
      .input-manual { display: flex; gap: 5px; margin-top: 10px; }
      #manualInput { flex: 1; padding: 15px; font-size: 18px; border-radius: 5px; border: none; font-weight: bold; text-align: center; text-transform: uppercase; }
      .btn-send { padding: 0 20px; font-size: 18px; background: #008000; color: white; border: none; border-radius: 5px; font-weight: bold; }
      
      .status-badge { display:none; background: #ffc107; color: #000; font-weight: bold; font-size: 12px; padding: 5px 10px; border-radius: 20px; margin-bottom: 10px; animation: blinker 1s linear infinite; }
      @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <h1 style="color:#00FF00; font-size:30px; margin-bottom:10px;">TRẠM KIỂM SOÁT</h1>
      <p style="color:#aaa; font-size:14px; margin-bottom: 30px;">(Cơ chế chuẩn App Native - V8)</p>
      <button id="btn-start" onclick="startSystem()">🎥 BẬT MÁY ẢNH</button>
    </div>
 
    <div id="status-popup">
      <span id="popup-icon" class="icon-large"></span>
      <div id="popup-msg"></div>
      <div id="debug-voice"></div>
    </div>
 
    <div class="main-ui" id="ui">
      <h3 style="color:#00FF00; margin-top:0;">📡 HỆ THỐNG ĐANG QUÉT</h3>
      <div id="processing-badge" class="status-badge">⏳ĐANG XỬ LÝ... KHÓA CAMERA</div>
      <div class="control-panel">
       <label>NGÀY QUÉT MÃ:</label>
        <input type="date" id="scanDate">
 
       <label>CHỌN NHIỆM VỤ THỰC THI:</label>
        <select id="eventSelect">
          <option value="" disabled selected>⚠️ HÃY CHỌN NHIỆM VỤ THỰC THI</option>
          <option value="DIEM_DANH_NGAY">📅 1. ĐIỂM DANH NGÀY</option>
          <option value="VE_TRANH_THU">🏃 2. VỀ NGHỈ TRANH THỦ</option>
          <option value="LEN_DON_VI">🎒 3. LÊN ĐƠN VỊ</option>
          <option value="VE_TU_TUC_T7">🏡 4. VỀ TỰ TÚC (Trước ngày trả quân)</option>
          <option value="VE_TU_TUC_CN">🏡 5. VỀ TỰ TÚC (Cùng ngày trả quân)</option>
          <option value="NGHI_LE_RA">🏖️ 6. NGHỈ LỄ (Quét RA)</option>
          <option value="NGHI_LE_VAO">🏫 7. NGHỈ LỄ (Quét VÀO)</option>
       </select>
      </div>
 
      <div id="scanner-container">
        <video id="video" autoplay muted playsinline></video>
        <div id="scan-region"></div>
        <button id="btn-flash" onclick="toggleFlash()" style="position: absolute; bottom: 10px; right: 10px; z-index: 20; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; color: white; display: none; cursor: pointer; transition: 0.3s;">⚡</button>
      </div>
      
      <canvas id="hidden-canvas" style="display:none;"></canvas>
      
      <div class="input-manual">
        <input type="text" id="manualInput" placeholder="NHẬP MÃ BẰNG TAY..." onkeydown="if(event.key==='Enter') handleManual()">
        <button class="btn-send" id="btnSendManual" onclick="handleManual()">OK</button>
      </div>
    </div>
    
    <script>
      // =========================================================================
      // LINK WEB APP GOOGLE SCRIPT CỦA BẠN (GIỮ NGUYÊN)
      // =========================================================================
      const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbxseVtj2cWTQnW-mfSRQNulVyDRxDFm_EFKE9wtQhz30aQ-Id2rwkpbPHMVmsSzWJ0A/exec";
 
      var video = document.getElementById("video");
      var scanRequestId = null;
      var currentStream = null;
      
      // =========================================================================
      // CƠ CHẾ STATE MACHINE (MÁY TRẠNG THÁI) - CHUẨN ZALO
      // =========================================================================
      var scanState = "IDLE"; 
      var lastScannedCode = ""; 
      
      var hiddenCanvas = document.getElementById("hidden-canvas");
      var hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });
      
      var tzOffset = (new Date()).getTimezoneOffset() * 60000;
      var todayLocal = (new Date(Date.now() - tzOffset)).toISOString().slice(0, 10);
      document.getElementById('scanDate').value = todayLocal;
 
      function startSystem() {
        try { var ctx = new (window.AudioContext || window.webkitAudioContext)(); ctx.resume(); } catch(e) {}
        
        // Cải tiến: Yêu cầu camera có độ phân giải cao hơn để quét mã phức tạp
        const constraints = {
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };

        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) { startStream(stream); })
        .catch(function(err) {
            // Nếu không được, thử lại với yêu cầu đơn giản hơn
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
              .then(function(stream) { startStream(stream); })
              .catch(function(err2) {
                  // Nếu vẫn không được, thử với bất kỳ camera nào
                  navigator.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) { startStream(stream); })
                    .catch(function(err3) { alert("Vui lòng cho phép trình duyệt truy cập Máy ảnh!"); });
              });
          });
      }
 
      function startStream(stream) {
        document.getElementById('start-screen').style.display = 'none'; 
        document.getElementById('ui').style.display = 'block';
        try { speak("Sẵn sàng quét mã."); } catch(e) {}
        
        currentStream = stream;
        video.srcObject = stream;
        video.setAttribute("playsinline", true); 
        
        // KIỂM TRA HỖ TRỢ ĐÈN FLASH (TORCH)
        setTimeout(() => {
            const track = stream.getVideoTracks()[0];
            try {
                const capabilities = track.getCapabilities();
                // Nếu trình duyệt hỗ trợ torch, hoặc không báo cáo nhưng ta cứ thử hiện
                if (capabilities.torch || 'torch' in capabilities) {
                    document.getElementById('btn-flash').style.display = 'block';
                }
            } catch(e) { 
                // Một số trình duyệt lỗi khi getCapabilities, vẫn thử hiện nút
                document.getElementById('btn-flash').style.display = 'block';
            }
        }, 500);

        video.play().then(() => {
            scanRequestId = requestAnimationFrame(tick);
          });
      }
 
      function tick() {
        if (scanState !== "IDLE") return;
      
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          // Cải tiến: Chỉ quét vùng trung tâm để tăng tốc và độ chính xác
          const videoWidth = video.videoWidth;
          const videoHeight = video.videoHeight;
      
          // Kích thước vùng quét (tương ứng với CSS của #scan-region)
          // top: 7%, left: 7%, width: 86%, height: 86%
          const scanX = videoWidth * 0.07;
          const scanY = videoHeight * 0.07;
          const scanWidth = videoWidth * 0.86;
          const scanHeight = videoHeight * 0.86;
      
          hiddenCanvas.width = scanWidth;
          hiddenCanvas.height = scanHeight;
      
          // Chép vùng quét từ video vào canvas (đây là bước crop)
          hiddenCtx.drawImage(video, scanX, scanY, scanWidth, scanHeight, 0, 0, scanWidth, scanHeight);
          
          var imageData = hiddenCtx.getImageData(0, 0, scanWidth, scanHeight);
          var code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert"
          });
      
          if (code && code.data !== "") {
            // Luôn chuyển mã quét được về chữ hoa để đồng bộ
            var processedCode = String(code.data).trim().toUpperCase();
            if (processedCode === lastScannedCode) {
              scanRequestId = requestAnimationFrame(tick);
              return;
            }
      
            triggerScanProcessing(processedCode);
            return;
          }
        }
        scanRequestId = requestAnimationFrame(tick);
      }
 
      function handleManual() { 
        if (scanState !== "IDLE") return; 
        // TỐI ƯU HÓA: Nhập tay cũng áp dụng quy tắc dịch ngược
        var rawVal = convertVietnameseToCode(document.getElementById('manualInput').value); 
        var val = restoreVietnameseFromCode(rawVal);

        if(val) { 
          document.getElementById('manualInput').value = '';
          document.getElementById('manualInput').blur(); 
          triggerScanProcessing(val); 
        }
      }
      
      function triggerScanProcessing(codeString) {
        scanState = "PROCESSING"; 
        // Xử lý đa chiều: CDD -> CĐ trước khi gửi đi xử lý
        var rawCode = convertVietnameseToCode(codeString); 
        var finalCode = restoreVietnameseFromCode(rawCode);
        lastScannedCode = finalCode; // Lưu mã đã xử lý để tránh quét lặp
        
        document.getElementById('processing-badge').style.display = 'inline-block';
        
        var container = document.getElementById('scanner-container');
        container.style.borderColor = "#00FF00";
        setTimeout(() => container.style.borderColor = "#555", 500);
        
        beep();
        handleProcess(finalCode);
      }
      
      function handleProcess(code) {
        var evt = document.getElementById('eventSelect').value;
        var dateStr = document.getElementById('scanDate').value;
        
        // KIỂM TRA ĐÃ CHỌN NHIỆM VỤ CHƯA
        if (!evt || evt === "") { 
            alert("⚠️ BẠN CHƯA CHỌN NHIỆM VỤ THỰC THI!\nVui lòng chọn nhiệm vụ trước khi quét mã."); 
            resumeScanning(); 
            return; 
        }

        if (!dateStr) { 
            alert("Vui lòng chọn ngày!"); 
            resumeScanning(); 
            return; 
        }
        
        showPopup('loading', 'Đang ghi dữ liệu...');
        
        var apiUrl = GOOGLE_API_URL + "?api=scan&msv=" + encodeURIComponent(code) +
        "&eventCode=" + encodeURIComponent(evt) +
        "&dateStr=" + encodeURIComponent(dateStr) + "&t=" + new Date().getTime();
        
        fetch(apiUrl)
          .then(response => response.json())
          .then(res => {
              if(res.success) { showPopup('success', res.message); } else { showPopup('error', res.message); }
              if(res.debugText) document.getElementById('debug-voice').innerText = "🔊 " + res.debugText;
              if(res.audio) speak(res.audio);
               
              setTimeout(() => { 
                  hidePopup(); 
                  resumeScanning(); 
                }, 2500);
            })
            .catch(err => {
              showPopup('error', 'LỖI MẠNG HOẶC MÁY CHỦ BẬN'); 
              setTimeout(() => { hidePopup(); resumeScanning(); }, 3000); 
            });
      }
 
      function resumeScanning() {
        document.getElementById('processing-badge').style.display = 'none';
        scanState = "IDLE"; 
        setTimeout(() => { lastScannedCode = ""; }, 5000);
        scanRequestId = requestAnimationFrame(tick); 
      }
 
      function showPopup(type, msg) {
        var p = document.getElementById('status-popup'); var icon = document.getElementById('popup-icon'); var txt = document.getElementById('popup-msg');
        p.style.display = 'block'; txt.innerHTML = msg; document.getElementById('debug-voice').innerText = "";
        if(type=='loading') { icon.innerHTML = '⏳'; p.style.background = 'rgba(0,0,0,0.85)'; }
        if(type=='success') { icon.innerHTML = '✅'; p.style.background = '#006400'; }
        if(type=='error')   { icon.innerHTML = '⛔'; p.style.background = '#8B0000'; }
      }
      function hidePopup() { document.getElementById('status-popup').style.display = 'none'; }
      function speak(text) { window.speechSynthesis.cancel(); var msg = new SpeechSynthesisUtterance(text); msg.lang = 'vi-VN'; msg.rate = 1.1; window.speechSynthesis.speak(msg); }
      function beep() { try { var ctx = new (window.AudioContext || window.webkitAudioContext)(); var o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 1500; o.connect(ctx.destination); o.start(); setTimeout(() => o.stop(), 100); } catch(e) {} }

      // ==========================================================
      // HÀM CHUYÊN GIA: CHUẨN HÓA MÃ TIẾNG VIỆT SANG KHÔNG DẤU
      // ==========================================================
      function convertVietnameseToCode(str) {
        if (!str) return "";
        str = String(str).trim().toUpperCase();
        
        // Bước 1: Đưa về dạng tổ hợp (NFC)
        str = str.normalize("NFC");
        
        // Bước 2: Thay thế các ký tự có dấu đặc trưng theo quy ước
        // Đ -> DD
        str = str.replace(/[Đ]/g, "DD");
        
        // Â, Ấ, Ầ... -> AA
        str = str.replace(/[ÂẤẦẨẪẬ]/g, "AA");
        
        // Ă, Ắ, Ằ... -> AW
        str = str.replace(/[ĂẮẰẲẴẶ]/g, "AW");
        
        // Ô, Ố, Ồ... -> OO
        str = str.replace(/[ÔỐỒỔỖỘ]/g, "OO");
        
        // Ê, Ế, Ề... -> EE
        str = str.replace(/[ÊẾỀỂỄỆ]/g, "EE");
        
        // Ơ, Ớ, Ờ... -> OW
        str = str.replace(/[ƠỚỜỞỠỢ]/g, "OW");
        
        // Ư, Ứ, Ừ... -> UW
        str = str.replace(/[ƯỨỪỬỮỰ]/g, "UW");
        
        // Bước 3: Loại bỏ các dấu thanh còn lại
        str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        
        return str;
      }

      // ==========================================================
      // HÀM DỊCH NGƯỢC: TỪ MÃ KHÔNG DẤU (CDD) -> VỀ MÃ GỐC (CĐ)
      // ==========================================================
      function restoreVietnameseFromCode(str) {
        if (!str) return "";
        str = String(str).trim().toUpperCase();
        // Quy ước dịch ngược lại để khớp với Database
        str = str.replace(/DD/g, "Đ");
        str = str.replace(/AA/g, "Â");
        str = str.replace(/AW/g, "Ă");
        str = str.replace(/OO/g, "Ô");
        str = str.replace(/EE/g, "Ê");
        str = str.replace(/OW/g, "Ơ");
        str = str.replace(/UW/g, "Ư");
        return str;
      }

      // ==========================================================
      // HÀM BẬT/TẮT ĐÈN FLASH (CHẾ ĐỘ BAN ĐÊM)
      // ==========================================================
      function toggleFlash() {
        if (!currentStream) return;
        const track = currentStream.getVideoTracks()[0];
        try {
            const currentSettings = track.getSettings();
            const isTorchOn = currentSettings.torch;
            track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
            // Cập nhật giao diện nút
            const btn = document.getElementById('btn-flash');
            if (!isTorchOn) {
                btn.style.background = "rgba(255, 215, 0, 0.8)";
                btn.style.color = "#000";
            } else {
                btn.style.background = "rgba(0,0,0,0.5)";
                btn.style.color = "white";
            }
        } catch(e) { 
            console.error(e);
            alert("Thiết bị không hỗ trợ điều khiển đèn Flash!"); 
        }
      }
    </script>
  </body>
</html>
